<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión - Donaton</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  </head>
  <body
    x-data="{ page: 'login', darkMode: false, showPassword: false }"
    x-init="
      darkMode = JSON.parse(localStorage.getItem('darkMode') || 'false');
      $watch('darkMode', v => localStorage.setItem('darkMode', JSON.stringify(v)))
    "
    :class="{'dark bg-gray-900': darkMode === true}"
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 p-4"
  >
    <main class="w-full max-w-md">
      <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-xl dark:border-gray-700 dark:bg-gray-800">
        <!-- Header -->
        <div class="text-center mb-8">
          <a href="home.html" class="inline-block">
            <h2 class="text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Donaton</h2>
          </a>
          <p class="text-gray-600 dark:text-gray-400 mt-2">Inicia sesión en tu cuenta</p>
        </div>
        
        <form action="#" method="POST" class="space-y-5">
          <!-- Email -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Correo electrónico</label>
            <div class="relative">
              <div class="absolute left-4 top-3.5">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
              </div>
              <input name="email" type="email" required class="w-full pl-12 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="tu@ejemplo.com" />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Contraseña</label>
            <div class="relative">
              <div class="absolute left-4 top-3.5">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
              </div>
              <input :type="showPassword ? 'text' : 'password'" name="password" required minlength="6" class="w-full pl-12 pr-12 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="••••••••" />
              <button type="button" @click="showPassword = !showPassword" class="absolute right-4 top-3.5">
                <svg x-show="!showPassword" class="w-5 h-5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <svg x-show="showPassword" class="w-5 h-5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-4.803m5.604-1.888A3.375 3.375 0 1119.5 10.5M9.172 9.172L21 21"></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
              <input type="checkbox" class="rounded w-4 h-4 text-blue-600 cursor-pointer" />
              <span>Recordarme</span>
            </label>
            <a href="#" class="text-sm text-blue-600 hover:underline dark:text-blue-400 font-medium">¿Olvidé contraseña?</a>
          </div>

          <!-- Submit Button -->
          <div>
            <button type="submit" class="w-full rounded-lg bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 font-semibold hover:shadow-lg transition-all duration-300 transform hover:scale-105">
              Acceder
            </button>
          </div>
        </form>

        <!-- Divider -->
        <div class="mt-6 relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400">O</span>
          </div>
        </div>

        <!-- Sign Up Link -->
        <p class="mt-6 text-sm text-gray-600 dark:text-gray-400 text-center">
          ¿No tienes cuenta?
          <a href="donaciones.html" class="text-blue-600 hover:underline dark:text-blue-400 font-bold">Hacer una donación sin cuenta</a>
        </p>

        <!-- Back to Home -->
        <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700">
          <a href="home.html" class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white text-center block font-medium flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Volver al inicio
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
